<!DOCTYPE html>
<html>
<head>
  <title>北上周边行 - Logo设计</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 40px; background: #f5f5f5; }
    .logos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
    .logo-card { background: white; padding: 30px; border-radius: 16px; text-align: center; }
    .logo-card svg { width: 120px; height: 120px; }
    .logo-card h3 { margin: 15px 0 8px; font-size: 14px; color: #333; }
    .logo-card p { font-size: 12px; color: #999; margin: 0; }
  </style>
</head>
<body>
  <h1 style="text-align:center; color:#4A90E2;">北上周边行 - Logo方案</h1>
  
  <div class="logos">
    <!-- 方案1: 山峰+方向 -->
    <div class="logo-card">
      <svg viewBox="0 0 120 120">
        <defs>
          <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4A90E2"/>
            <stop offset="100%" style="stop-color:#667eea"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="55" fill="url(#grad1)"/>
        <path d="M30 75 L50 45 L60 55 L70 40 L90 75 Z" fill="white" opacity="0.9"/>
        <path d="M55 25 L60 15 L65 25 L60 20 Z" fill="white"/>
        <path d="M60 20 L60 35 M55 30 L60 35 L65 30" stroke="white" stroke-width="2" fill="none"/>
      </svg>
      <h3>方案1: 山峰指引</h3>
      <p>山峰+方向箭头，寓意向北探索</p>
    </div>

    <!-- 方案2: 路径+山 -->
    <div class="logo-card">
      <svg viewBox="0 0 120 120">
        <defs>
          <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4A90E2"/>
            <stop offset="100%" style="stop-color:#764ba2"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="55" fill="url(#grad2)"/>
        <path d="M25 80 Q40 60 60 65 Q80 70 95 50" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M35 75 L50 50 L60 58 L75 35 L85 75 Z" fill="white" opacity="0.85"/>
        <circle cx="95" cy="50" r="5" fill="#FFD700"/>
      </svg>
      <h3>方案2: 行程之路</h3>
      <p>路径穿越群山，终点星光</p>
    </div>

    <!-- 方案3: 简约北字 -->
    <div class="logo-card">
      <svg viewBox="0 0 120 120">
        <defs>
          <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#667eea"/>
            <stop offset="100%" style="stop-color:#764ba2"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="55" fill="url(#grad3)"/>
        <text x="60" y="72" text-anchor="middle" font-size="40" font-weight="bold" fill="white">北</text>
        <path d="M60 78 L60 90 M55 85 L60 90 L65 85" stroke="white" stroke-width="2.5" fill="none"/>
      </svg>
      <h3>方案3: 北字导航</h3>
      <p>简约北字+向下箭头，指引方向</p>
    </div>

    <!-- 方案4: 山+太阳 -->
    <div class="logo-card">
      <svg viewBox="0 0 120 120">
        <defs>
          <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4A90E2"/>
            <stop offset="100%" style="stop-color:#667eea"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="55" fill="url(#grad4)"/>
        <circle cx="75" cy="30" r="12" fill="#FFD700"/>
        <path d="M20 80 L45 50 L55 58 L70 40 L100 80 Z" fill="white" opacity="0.9"/>
        <path d="M85 75 L95 65 L100 80 Z" fill="white" opacity="0.7"/>
      </svg>
      <h3>方案4: 山间日出</h3>
      <p>山峰+朝阳，象征新旅程</p>
    </div>

    <!-- 方案5: 指南针 -->
    <div class="logo-card">
      <svg viewBox="0 0 120 120">
        <defs>
          <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4A90E2"/>
            <stop offset="100%" style="stop-color:#667eea"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="55" fill="url(#grad5)"/>
        <circle cx="60" cy="60" r="40" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
        <path d="M60 25 L68 60 L60 95 L52 60 Z" fill="white"/>
        <path d="M60 25 L68 60 L60 60 Z" fill="#FFD700"/>
        <text x="60" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">N</text>
      </svg>
      <h3>方案5: 北向指南针</h3>
      <p>指南针指向北方，精准导航</p>
    </div>

    <!-- 方案6: 足迹+山 -->
    <div class="logo-card">
      <svg viewBox="0 0 120 120">
        <defs>
          <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4A90E2"/>
            <stop offset="100%" style="stop-color:#764ba2"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="55" fill="url(#grad6)"/>
        <path d="M30 80 L50 50 L60 58 L80 35 L90 80 Z" fill="white" opacity="0.85"/>
        <ellipse cx="50" cy="88" rx="8" ry="5" fill="white" opacity="0.6" transform="rotate(-20 50 88)"/>
        <ellipse cx="70" cy="88" rx="8" ry="5" fill="white" opacity="0.8" transform="rotate(20 70 88)"/>
      </svg>
      <h3>方案6: 踏遍群山</h3>
      <p>山峰+足迹，行走的旅程</p>
    </div>
  </div>

  <p style="text-align:center; margin-top:40px; color:#666;">
    选择喜欢的方案，我可以导出PNG/SVG格式
  </p>
</body>
</html>
