<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>登录</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(180deg, #eef6ff 0%, #ffffff 100%);
}

/* 背景光斑 */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.circle {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.35;
}

.c1 {
  width: 300px;
  height: 300px;
  background: #4990e2;
  top: -80px;
  left: -100px;
}

.c2 {
  width: 250px;
  height: 250px;
  background: #7bb8ff;
  bottom: -100px;
  right: -80px;
}

/* 内容 */
.container {
  position: relative;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 32px;
  text-align: center;
}

/* logo */
.logo {
  width: 72px;
  height: 72px;
  margin: 0 auto 24px;
  border-radius: 20px;
  background: linear-gradient(135deg, #4990e2, #7bb8ff);
  color: #fff;
  font-size: 28px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 12px 30px rgba(73,144,226,0.25);
}

/* 标题 */
.title {
  font-size: 22px;
  font-weight: 600;
  color: #1d1d1f;
  margin-bottom: 10px;
}

/* 描述 */
.desc {
  font-size: 14px;
  color: #8a8a8a;
  margin-bottom: 40px;
  line-height: 1.6;
}

/* 登录按钮 */
.btn {
  width: 100%;
  height: 52px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #4990e2, #6fb1fc);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  box-shadow: 0 10px 25px rgba(73,144,226,0.25);
  cursor: pointer;
  transition: 0.2s;
}

.btn:active {
  transform: scale(0.98);
  opacity: 0.9;
}

/* 次级提示 */
.tip {
  margin-top: 18px;
  font-size: 12px;
  color: #aaa;
}

.tip a {
  color: #4990e2;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="bg">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
</div>

<div class="container">

  <div class="logo">行</div>

  <div class="title">欢迎使用</div>
  <div class="desc">
    一键登录后即可查看完整内容<br/>
    开启你的专属行程体验
  </div>

  <button class="btn" onclick="login()">
    微信一键登录
  </button>

  <div class="tip">
    登录即表示同意 <a href="#">用户协议</a> 与 <a href="#">隐私政策</a>
  </div>

</div>

<script>
function login(){
  alert("这里接微信小程序 getPhoneNumber 或 OAuth 登录");
}
</script>

</body>
</html>
