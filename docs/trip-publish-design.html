<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布行程页设计稿</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #1a1a2e;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
    }

    .design-wrapper {
      text-align: center;
    }

    .design-label {
      color: white;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      padding: 8px 20px;
      border-radius: 20px;
      display: inline-block;
      background: linear-gradient(135deg, #4A90E2, #6BA3E8);
    }

    .phone-frame {
      width: 375px;
      height: 812px;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      position: relative;
      margin: 0 auto;
      background: #FFFFFF;
    }

    .scroll-container {
      height: 100%;
      overflow-y: auto;
      padding-bottom: 100px;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    .status-bar {
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      font-size: 14px;
    }

    /* ========== 表格样式 ========== */
    :root {
      --bg: #FFFFFF;
      --divider: #F0F0F5;
      --text: #1A1A2E;
      --text-sub: #6B6B80;
      --text-hint: #A0A0B0;
      --accent: #4A90E2;
    }

    .nav-bar {
      background: white;
      padding: 12px 16px;
      padding-top: 44px;
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
    }

    .nav-title {
      flex: 1;
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    .form-table {
      width: 100%;
    }

    .table-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      border-bottom: 1px solid var(--divider);
    }

    .table-cell {
      padding: 14px 16px;
      display: flex;
      align-items: center;
    }

    .cell-label {
      background: #FAFAFC;
      font-size: 14px;
      color: var(--text-sub);
      font-weight: 500;
    }

    .cell-label .required {
      color: #EF4444;
      margin-left: 2px;
    }

    .cell-value {
      font-size: 15px;
      color: var(--text);
      justify-content: flex-end;
    }

    .cell-value.hint {
      color: var(--text-hint);
    }

    .cell-value input {
      text-align: right;
    }

    .input-field {
      width: 100%;
      padding: 0;
      border: none;
      font-size: 15px;
      background: transparent;
      color: var(--text);
      outline: none;
    }

    .input-field::placeholder {
      color: var(--text-hint);
    }

    .tag-group {
      display: flex;
      gap: 8px;
    }

    .tag-btn {
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      background: rgba(74, 144, 226, 0.1);
      color: var(--text-sub);
      border: 1px solid rgba(74, 144, 226, 0.3);
      cursor: pointer;
    }

    .tag-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .counter-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .counter-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(74, 144, 226, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--accent);
      border: none;
      cursor: pointer;
    }

    .counter-num {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      min-width: 32px;
      text-align: center;
    }

    .section-divider {
      height: 12px;
      background: #FAFAFC;
    }

    .collapsible-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: white;
      border-bottom: 1px solid var(--divider);
      cursor: pointer;
    }

    .collapsible-header:active {
      background: #F8F9FA;
    }

    .collapsible-title {
      font-size: 14px;
      color: var(--text-sub);
      font-weight: 500;
    }

    .collapsible-arrow {
      font-size: 14px;
      color: var(--text-hint);
      transition: transform 0.2s ease;
    }

    .collapsible-arrow.expanded {
      transform: rotate(180deg);
    }

    .collapsible-content {
      display: none;
    }

    .collapsible-content.expanded {
      display: block;
    }

    .textarea-row {
      display: block;
      padding: 14px 16px;
      border-bottom: 1px solid var(--divider);
      text-align: left;
    }

    .textarea-label {
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 10px;
      display: block;
      text-align: left;
    }

    .textarea-field {
      width: 100%;
      height: 80px;
      border: none;
      font-size: 15px;
      background: transparent;
      resize: none;
      font-family: inherit;
      line-height: 1.6;
      color: var(--text);
      outline: none;
      text-align: left;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--text-hint);
      margin-top: 6px;
    }

    .footer-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px 28px;
      background: white;
      border-top: 1px solid var(--divider);
    }

    .submit-btn {
      width: 100%;
      height: 50px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .desc-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--divider);
      border-radius: 8px;
      font-size: 14px;
      background: #FAFAFC;
      color: var(--text);
      outline: none;
    }

    .desc-input::placeholder {
      color: var(--text-hint);
    }
  </style>
</head>
<body>

  <!-- ========== 有车版本 ========== -->
  <div class="design-wrapper">
    <div class="design-label">有车版本 🚗</div>
    <div class="phone-frame">
      <div class="status-bar">
        <span>21:18</span>
        <div>📶 🔋</div>
      </div>

      <div class="nav-bar">
        <div style="width: 32px;"></div>
        <span class="nav-title">发布行程</span>
        <div style="width: 32px;"></div>
      </div>

      <div class="scroll-container">
        <!-- 行程标题（可选） -->
        <div class="form-table">
          <div class="table-row">
            <div class="table-cell cell-label">行程标题</div>
            <div class="table-cell cell-value">
              <input type="text" class="input-field" placeholder="给行程起个名字（选填）">
            </div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- 目的地 -->
        <div class="form-table">
          <div class="table-row">
            <div class="table-cell cell-label">目的地<span class="required">*</span></div>
            <div class="table-cell cell-value hint">请选择 ›</div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- 行程信息 -->
        <div class="form-table">
          <div class="table-row">
            <div class="table-cell cell-label">出发地<span class="required">*</span></div>
            <div class="table-cell cell-value hint">请选择 ›</div>
          </div>
          <div class="table-row">
            <div class="table-cell cell-label">出行日期<span class="required">*</span></div>
            <div class="table-cell cell-value hint">请选择 ›</div>
          </div>
          <div class="table-row">
            <div class="table-cell cell-label">出行方式<span class="required">*</span></div>
            <div class="table-cell cell-value">
              <div class="tag-group">
                <button class="tag-btn active">有车</button>
                <button class="tag-btn">无车</button>
              </div>
            </div>
          </div>
          <div class="table-row">
            <div class="table-cell cell-label">招募人数<span class="required">*</span></div>
            <div class="table-cell cell-value">
              <div class="counter-wrap">
                <button class="counter-btn">−</button>
                <span class="counter-num">3</span>
                <button class="counter-btn">+</button>
              </div>
            </div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- 联系方式 -->
        <div class="form-table">
          <div class="table-row">
            <div class="table-cell cell-label">手机号<span class="required">*</span></div>
            <div class="table-cell cell-value">
              <input type="text" class="input-field" placeholder="同时也是微信号">
            </div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- 可选信息 -->
        <div class="collapsible-header" onclick="toggleCollapsible(this)">
          <span class="collapsible-title">可选信息</span>
          <span class="collapsible-arrow">▾</span>
        </div>
        <div class="collapsible-content">
          <div class="form-table">
            <div class="table-row">
              <div class="table-cell cell-label">集合地点</div>
              <div class="table-cell cell-value">
                <input type="text" class="input-field" placeholder="选填">
              </div>
            </div>
            <div class="table-row">
              <div class="table-cell cell-label">集合时间</div>
              <div class="table-cell cell-value hint">请选择 ›</div>
            </div>
            <div class="table-row">
              <div class="table-cell cell-label">车辆座位</div>
              <div class="table-cell cell-value">
                <input type="text" class="input-field" placeholder="如：5座（选填）">
              </div>
            </div>
            <div class="table-row">
              <div class="table-cell cell-label">车辆型号</div>
              <div class="table-cell cell-value">
                <input type="text" class="input-field" placeholder="如：大众途观（选填）">
              </div>
            </div>
            <div class="table-row">
              <div class="table-cell cell-label">人均价格</div>
              <div class="table-cell cell-value">
                <input type="text" class="input-field" placeholder="如：150元（选填）">
              </div>
            </div>
          </div>
          <!-- 行程说明 -->
          <div class="textarea-row">
            <label class="textarea-label">行程说明</label>
            <textarea class="textarea-field" placeholder="描述行程安排、费用分摊方式、对同伴的要求等"></textarea>
            <div class="char-count">0/200</div>
          </div>
        </div>

        <div style="height: 100px;"></div>
      </div>

      <div class="footer-bar">
        <button class="submit-btn">发布行程</button>
      </div>
    </div>
  </div>

  <!-- ========== 无车版本 ========== -->
  <div class="design-wrapper">
    <div class="design-label">无车版本 🚶</div>
    <div class="phone-frame">
      <div class="status-bar">
        <span>21:18</span>
        <div>📶 🔋</div>
      </div>

      <div class="nav-bar">
        <div style="width: 32px;"></div>
        <span class="nav-title">发布行程</span>
        <div style="width: 32px;"></div>
      </div>

      <div class="scroll-container">
        <!-- 行程标题（可选） -->
        <div class="form-table">
          <div class="table-row">
            <div class="table-cell cell-label">行程标题</div>
            <div class="table-cell cell-value">
              <input type="text" class="input-field" placeholder="给行程起个名字（选填）">
            </div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- 目的地 -->
        <div class="form-table">
          <div class="table-row">
            <div class="table-cell cell-label">目的地<span class="required">*</span></div>
            <div class="table-cell cell-value hint">请选择 ›</div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- 行程信息 -->
        <div class="form-table">
          <div class="table-row">
            <div class="table-cell cell-label">出发地<span class="required">*</span></div>
            <div class="table-cell cell-value hint">请选择 ›</div>
          </div>
          <div class="table-row">
            <div class="table-cell cell-label">出行日期<span class="required">*</span></div>
            <div class="table-cell cell-value hint">请选择 ›</div>
          </div>
          <div class="table-row">
            <div class="table-cell cell-label">出行方式<span class="required">*</span></div>
            <div class="table-cell cell-value">
              <div class="tag-group">
                <button class="tag-btn">有车</button>
                <button class="tag-btn active">无车</button>
              </div>
            </div>
          </div>
          <div class="table-row">
            <div class="table-cell cell-label">招募人数<span class="required">*</span></div>
            <div class="table-cell cell-value">
              <div class="counter-wrap">
                <button class="counter-btn">−</button>
                <span class="counter-num">3</span>
                <button class="counter-btn">+</button>
              </div>
            </div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- 联系方式 -->
        <div class="form-table">
          <div class="table-row">
            <div class="table-cell cell-label">手机号<span class="required">*</span></div>
            <div class="table-cell cell-value">
              <input type="text" class="input-field" placeholder="同时也是微信号">
            </div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- 可选信息 -->
        <div class="collapsible-header" onclick="toggleCollapsible(this)">
          <span class="collapsible-title">可选信息</span>
          <span class="collapsible-arrow">▾</span>
        </div>
        <div class="collapsible-content">
          <div class="form-table">
            <div class="table-row">
              <div class="table-cell cell-label">集合地点</div>
              <div class="table-cell cell-value">
                <input type="text" class="input-field" placeholder="选填">
              </div>
            </div>
            <div class="table-row">
              <div class="table-cell cell-label">集合时间</div>
              <div class="table-cell cell-value hint">请选择 ›</div>
            </div>
            <div class="table-row">
              <div class="table-cell cell-label">出行描述</div>
              <div class="table-cell cell-value">
                <input type="text" class="input-field" placeholder="如：地铁+公交（10字内）" maxlength="10">
              </div>
            </div>
            <div class="table-row">
              <div class="table-cell cell-label">人均价格</div>
              <div class="table-cell cell-value">
                <input type="text" class="input-field" placeholder="如：150元（选填）">
              </div>
            </div>
          </div>
          <!-- 行程说明 -->
          <div class="textarea-row">
            <label class="textarea-label">行程说明</label>
            <textarea class="textarea-field" placeholder="描述行程安排、费用分摊方式、对同伴的要求等"></textarea>
            <div class="char-count">0/200</div>
          </div>
        </div>

        <div style="height: 100px;"></div>
      </div>

      <div class="footer-bar">
        <button class="submit-btn">发布行程</button>
      </div>
    </div>
  </div>

  <script>
    function toggleCollapsible(header) {
      const arrow = header.querySelector('.collapsible-arrow');
      const content = header.nextElementSibling;
      arrow.classList.toggle('expanded');
      content.classList.toggle('expanded');
    }
  </script>
</body>
</html>
