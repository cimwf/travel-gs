<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>行程列表</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(180deg, #eef6ff 0%, #ffffff 100%);
}

/* ===== 背景光斑（完全 Login） ===== */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.circle {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.35;
}

.c1 {
  width: 320px;
  height: 320px;
  background: #4990e2;
  top: -120px;
  left: -120px;
}

.c2 {
  width: 260px;
  height: 260px;
  background: #7bb8ff;
  bottom: -120px;
  right: -100px;
}

/* ===== 容器 ===== */
.container {
  position: relative;
  height: 100vh;
  padding: 16px 16px 100px;
  overflow-y: auto;
}

/* ===== 标题 ===== */
.title {
  font-size: 22px;
  font-weight: 600;
  color: #1d1d1f;
  margin: 18px 4px 6px;
}

.sub {
  font-size: 13px;
  color: #8a8a8a;
  margin: 0 4px 16px;
}

/* ===== 筛选栏（基础） ===== */
.filter-bar {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 6px 2px 14px;
}

.filter-chip {
  white-space: nowrap;
  font-size: 13px;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  color: #444;
}

.filter-chip.active {
  background: rgba(73,144,226,0.15);
  color: #4990e2;
}

/* ===== 卡片 ===== */
.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.06);
}

/* 顶部 */
.card-top {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg,#4A90E2,#7bb8ff);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
}

.card-title {
  flex: 1;
}

.name {
  font-size: 15px;
  font-weight: 600;
  color: #1d1d1f;
}

.tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 999px;
  display: inline-block;
  margin-top: 4px;
}

.green { background: rgba(82,196,26,0.12); color:#52c41a; }
.orange { background: rgba(250,173,20,0.12); color:#faad14; }
.gray { background: rgba(140,140,140,0.12); color:#8c8c8c; }

/* 中间信息 */
.meta {
  margin-top: 10px;
  font-size: 12px;
  color: #888;
  display: flex;
  gap: 10px;
}

/* 底部 */
.bottom {
  margin-top: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* 头像 stack */
.avatars {
  display: flex;
}

.ava {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  margin-left: -6px;
  border: 2px solid white;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.ava:nth-child(2){ background:linear-gradient(135deg,#a18cd1,#fbc2eb); }
.ava:nth-child(3){ background:linear-gradient(135deg,#43e97b,#38f9d7); }

/* 进度 */
.progress {
  font-size: 12px;
  color: #4990e2;
  font-weight: 500;
}

/* 发布按钮（Login一致） */
.btn {
  position: fixed;
  bottom: 22px;
  left: 16px;
  right: 16px;
  height: 52px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg,#4990e2,#6fb1fc);
  color: white;
  font-size: 16px;
  font-weight: 500;
  box-shadow: 0 12px 30px rgba(73,144,226,0.25);
}
</style>
</head>

<body>

<div class="bg">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
</div>

<div class="container">

  <div class="title">行程列表</div>
  <div class="sub">发现与你同行的人</div>

  <!-- 筛选系统（升级版） -->
  <div class="filter-bar">
    <div class="filter-chip active">全部</div>
    <div class="filter-chip">目的地 ▾</div>
    <div class="filter-chip">出发地 ▾</div>
    <div class="filter-chip">时间 ▾</div>
    <div class="filter-chip">招募中</div>
  </div>

  <!-- 卡片 -->
  <div class="card">
    <div class="card-top">
      <div class="avatar">🏔️</div>
      <div class="card-title">
        <div class="name">黄山两日游</div>
        <div class="tag green">招募中</div>
      </div>
    </div>

    <div class="meta">
      <span>📅 5/15</span>
      <span>📍 杭州</span>
    </div>

    <div class="bottom">
      <div class="avatars">
        <div class="ava"></div>
        <div class="ava"></div>
        <div class="ava"></div>
      </div>
      <div class="progress">还差2人</div>
    </div>
  </div>

  <div class="card">
    <div class="card-top">
      <div class="avatar">🏝️</div>
      <div class="card-title">
        <div class="name">海南环岛游</div>
        <div class="tag gray">已满员</div>
      </div>
    </div>

    <div class="meta">
      <span>📅 5/10</span>
      <span>📍 海口</span>
    </div>

    <div class="bottom">
      <div class="avatars">
        <div class="ava"></div>
        <div class="ava"></div>
        <div class="ava"></div>
      </div>
      <div class="progress">6/6</div>
    </div>
  </div>

</div>

<button class="btn">发布行程</button>

</body>
</html>
